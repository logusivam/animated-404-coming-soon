<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Application Loading</title>
    <!-- 
        Tailwind requires the JIT script to process custom classes and styles in this single-file setup.
        We've included the recommended script below, which dynamically creates the styles. 
    -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="assets/css/style.css">

</head>
<body class="bg-gray-900 text-white flex items-center justify-center">

    <div id="content-container" class="text-center p-8 m-4 max-w-lg w-full bg-gray-800 rounded-xl shadow-2xl transition-all duration-500">
        
        <div id="loading-view">
            <!-- Main Animated 404 Title -->
            <h1 class="text-8xl md:text-9xl font-extrabold text-indigo-500 mb-4 animate-dramatic-pulse">
                404
            </h1>

            <!-- Subtitle -->
            <p class="text-xl md:text-2xl font-semibold mb-8 text-gray-300">
                Application Endpoint Not Found
            </p>

            <!-- Loading Message -->
            <div class="mb-8">
                <p class="text-indigo-300 text-lg mb-4" id="loading-text">
                    Initializing application core...
                </p>
                
                <!-- Loading Bar -->
                <div class="loading-bar-container mx-auto bg-gray-700 rounded-full overflow-hidden">
                    <div id="progress-bar" 
                         class="loading-bar-active h-full bg-indigo-500 transition-all duration-100 ease-linear rounded-full" 
                         style="width: 0%;">
                    </div>
                </div>
            </div>

            <!-- Coming Soon CTA -->
            <p class="text-sm text-gray-500 italic">
                We're currently deploying the full application. Please wait a moment!
            </p>
        </div>

        <!-- Developer View (Appears after "loading" is complete) -->
        <div id="developer-view" class="hidden p-6 bg-gray-700/50 border-2 border-indigo-400 rounded-lg">
            <!-- SVG Icon for Developer/Laptop -->
            <svg xmlns="http://www.w3.org/2000/svg" class="h-16 w-16 mx-auto text-indigo-300 mb-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect>
                <line x1="8" y1="21" x2="16" y2="21"></line>
                <line x1="12" y1="17" x2="12" y2="21"></line>
                <!-- Coding dots on screen -->
                <line x1="6" y1="13" x2="6" y2="13.01"></line>
                <line x1="10" y1="13" x2="10" y2="13.01"></line>
                <line x1="14" y1="13" x2="14" y2="13.01"></line>
                <line x1="18" y1="13" x2="18" y2="13.01"></line>
                <!-- Simple code block -->
                <polyline points="9 9 12 6 15 9"></polyline>
                <line x1="12" y1="6" x2="12" y2="11"></line>
            </svg>
             <p class="text-2xl font-bold text-white mb-2">Development in Progress...</p>
             <p class="text-indigo-200 text-lg">Wait, will add the rest of the apps soon.</p>
        </div>
        
    </div>

<script src="assets/js/script.js"></script>
</body>
</html>
